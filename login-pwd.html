<!DOCTYPE html>
<html lang="jv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mlebu Sandi - Mobile IDE</title>
    <!-- Tailwind CSS (for quick styling) and Outfit font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#070a13',
                            panel: '#0d1321',
                            border: '#1e293b',
                            accent: '#6366f1',
                            500: '#4f46e5',
                            600: '#4338ca',
                            700: '#3730a3',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #070a13;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(79, 70, 229, 0.08) 0px, transparent 50%);
        }
        .glass-panel {
            background: rgba(13, 19, 33, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel rounded-3xl p-8 shadow-2xl shadow-indigo-950/20 border border-slate-800">
        <!-- Logo and Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-600/10 border border-indigo-500/20 text-indigo-400 mb-4">
                <i data-lucide="lock" class="w-7 h-7"></i>
            </div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-white via-slate-200 to-indigo-400 bg-clip-text text-transparent">
                Akses Diwatesi
            </h1>
            <p class="text-xs text-slate-400 mt-2 leading-relaxed">
                Lebokake sandi keamanan kanggo ngakses Antigravity Mobile IDE.
            </p>
        </div>

        <!-- Error Banner -->
        <div id="error-banner" class="hidden mb-6 p-4 bg-red-950/50 border border-red-500/30 text-red-300 rounded-2xl text-xs flex items-start space-x-3">
            <i data-lucide="alert-circle" class="w-4 h-4 shrink-0 text-red-400 mt-0.5"></i>
            <span id="error-message">Sandi sing njenengan lebokake salah!</span>
        </div>

        <!-- Password Input Form -->
        <form onsubmit="submitPassword(event)" class="space-y-6">
            <div>
                <label for="password-input" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Sandi Keamanan</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i data-lucide="key-round" class="w-4 h-4"></i>
                    </span>
                    <input type="password" id="password-input" required placeholder="Ketik sandi ing kene..." class="w-full bg-brand-dark/80 border border-brand-border rounded-xl py-3 pl-10 pr-10 text-sm text-white focus:outline-none focus:border-brand-500 transition duration-200">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 hover:text-white transition-colors">
                        <i id="eye-icon" data-lucide="eye" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-3 px-4 bg-gradient-to-r from-brand-600 to-indigo-500 hover:from-brand-700 hover:to-indigo-600 text-white font-semibold rounded-xl transition duration-300 transform active:scale-95 shadow-lg shadow-indigo-600/20 flex items-center justify-center space-x-2">
                <span>Mlebu</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        function togglePasswordVisibility() {
            const input = document.getElementById('password-input');
            const eyeIcon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        async function submitPassword(e) {
            e.preventDefault();
            const password = document.getElementById('password-input').value;
            const submitBtn = document.getElementById('submit-btn');
            const banner = document.getElementById('error-banner');

            banner.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>Mriksa...</span>';
            lucide.createIcons();

            try {
                const res = await fetch('/api/auth/pwd', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `password=${encodeURIComponent(password)}`
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    const text = await res.text();
                    document.getElementById('error-message').innerText = text || "Sandi keamanan salah!";
                    banner.classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('error-message').innerText = "Gagal komunikasi karo server";
                banner.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Mlebu</span><i data-lucide="arrow-right" class="w-4 h-4"></i>';
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
