<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Antigravity Mobile IDE</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            900: '#4c1d95',
                            dark: '#090a15',
                            panel: '#111326',
                            border: '#1f2347',
                            accent: '#a855f7'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-full flex items-center justify-center bg-brand-dark p-4 relative overflow-hidden font-['Outfit']">

    <!-- Background glowing orbs -->
    <div class="absolute w-96 h-96 rounded-full bg-brand-600/20 blur-3xl -top-20 -left-20 animate-pulse"></div>
    <div class="absolute w-96 h-96 rounded-full bg-brand-accent/15 blur-3xl -bottom-20 -right-20 animate-pulse" style="animation-delay: 2s;"></div>

    <div class="w-full max-w-md bg-brand-panel/60 backdrop-blur-xl border border-brand-border p-8 rounded-2xl shadow-2xl relative z-10">
        
        <!-- Header / Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-brand-600 to-brand-accent flex items-center justify-center shadow-lg shadow-brand-500/20 mb-4">
                <i data-lucide="shield-alert" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-white via-slate-200 to-brand-accent bg-clip-text text-transparent">
                Antigravity Mobile IDE
            </h1>
            <p class="text-xs text-slate-400 mt-1">Lebokake sandi keamanan kanggo masuk</p>
        </div>

        <!-- Form -->
        <form onsubmit="handleLogin(event)" class="space-y-6">
            <div>
                <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </span>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full bg-brand-dark/80 border border-brand-border rounded-xl py-3 pl-10 pr-10 text-sm text-white focus:outline-none focus:border-brand-500 transition duration-200 placeholder-slate-600">
                    <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 hover:text-slate-300">
                        <i id="eye-icon" data-lucide="eye" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <!-- Error Banner -->
            <div id="error-banner" class="hidden flex items-center space-x-2 bg-red-950/50 border border-red-500/30 text-red-200 p-3 rounded-lg text-xs">
                <i data-lucide="alert-circle" class="w-4 h-4 shrink-0 text-red-400"></i>
                <span id="error-message">Sandi sing dilebokake salah!</span>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-3 px-4 bg-gradient-to-r from-brand-600 to-brand-accent hover:from-brand-700 hover:to-brand-600 text-white font-semibold rounded-xl transition duration-300 transform active:scale-95 shadow-lg shadow-brand-600/30 flex items-center justify-center space-x-2">
                <span>Masuk Ke Workspace</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center">
            <span class="text-[10px] text-slate-600">
                Mengamankan server ngoding njenengan saka akses liar.
            </span>
        </div>

    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                pwdInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        async function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const banner = document.getElementById('error-banner');
            const submitBtn = document.getElementById('submit-btn');

            banner.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>Memverifikasi...</span>';
            lucide.createIcons();

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `password=${encodeURIComponent(password)}`
                });

                if (res.ok) {
                    // Success, redirect to home
                    window.location.href = '/';
                } else {
                    const text = await res.text();
                    document.getElementById('error-message').innerText = text || "Password salah!";
                    banner.classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('error-message').innerText = "Gagal komunikasi karo server";
                banner.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Masuk Ke Workspace</span><i data-lucide="arrow-right" class="w-4 h-4"></i>';
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
